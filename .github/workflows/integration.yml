name: Integration

on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/integration.yml'
      # Any nixos/ change can alter the system the smoke test builds.
      # Previously this only watched nixos/tests/** and nixos/modules/**,
      # which silently skipped the appliance build on changes to
      # nixos/appliance-base.nix and nixos/system-flake/** (e.g. #534's
      # qemu-guest-agent + guest-tools overlay) — exactly the files the
      # test validates. Watch all of nixos/ so build-affecting config
      # can't merge unvalidated.
      - 'nixos/**'
      - 'flake.nix'
      - 'flake.lock'

permissions:
  # `id-token: write` required by Magic Nix Cache for OIDC auth against
  # the GitHub Actions cache (the per-branch incremental Nix cache).
  id-token: write
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bcachefs-smoke:
    name: bcachefs smoke (NixOS test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Magic Nix Cache uses GitHub Actions' cache as a Nix binary
      # cache, layered on top of cachix. Cachix carries main-branch
      # closures; Magic Nix Cache adds per-branch incremental caching
      # across PR runs. On a PR that touches one Rust crate, only that
      # crate + downstream rebuild — the rest substitutes from Actions
      # cache. Realistic win on this job: ~36 min cold → ~15 min warm
      # (VM-boot overhead is still ~10 min and uncacheable).
      - uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          # See sibling workflow nix-engine-build.yml for the rationale.
          use-flakehub: false

      # Read-only on PRs and workflow_dispatch; the conditional push step
      # below populates the cache when this run is a push to main. Folding
      # what used to be a separate "Push to Cachix" workflow in here means
      # we Nix-build engine/webui/bcachefs-tools once per push instead of
      # twice (the smoke checks already depend on them as derivations).
      - uses: cachix/cachix-action@v17
        with:
          name: nasty
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Compute npm deps hash
        # appliance-smoke builds the webui via Nix, which hardcodes
        # npmDepsHash in flake.nix. Recompute here to match the current
        # package-lock.json — same trick build-iso.yml uses.
        run: |
          HASH=$(nix run nixpkgs#prefetch-npm-deps -- webui/package-lock.json 2>/dev/null)
          sed -i "s|npmDepsHash = \".*\"|npmDepsHash = \"$HASH\"|" flake.nix

      - name: Run integration tests
        run: |
          nix build \
            .#checks.x86_64-linux.bcachefs-smoke \
            .#checks.x86_64-linux.appliance-smoke \
            -L --print-build-logs

      - name: AD member-join VM test (non-gating)
        # The two-node AD test provisions a throwaway Samba AD DC in a VM.
        # Getting that simulated DC fully initialized is essentially the
        # phase-2 (NASty-as-DC) problem and currently fails at the DC's
        # own LDAP layer ("Operations error") — a fake-DC defect, not the
        # member-join engine. The engine is validated end-to-end against a
        # REAL AD DC (Synology Directory Server): join, trust, workgroup
        # discovery, winbind idmap, domain-user SMB auth with correct file
        # ownership, and leave all pass. Kept running (not gating) so it's
        # ready to re-promote once the throwaway DC is hardened in phase 2.
        continue-on-error: true
        run: |
          nix build \
            .#checks.x86_64-linux.ad-member \
            -L --print-build-logs

      - name: Build and push packages to Cachix
        # Run on push-to-main and manual dispatch (matches what the
        # standalone cache.yml workflow used to trigger on), and only
        # after the checks above pass. cachix-action pushes everything
        # currently in /nix/store on exit, so explicitly building the
        # package outputs here ensures they land in the cache for end
        # users to pull. The checks above already pulled in
        # engine/webui/bcachefs-tools transitively, so this is mostly a
        # no-op rebuild that just realises the named output paths.
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        run: |
          nix build .#packages.x86_64-linux.engine \
            --no-link -L
          nix build .#packages.x86_64-linux.webui \
            --no-link -L
          nix build .#packages.x86_64-linux.bcachefs-tools \
            --no-link -L

  aarch64-cache-push:
    name: Build & push aarch64 packages to Cachix
    # No native aarch64 NixOS test job (the smoke tests live under
    # checks.x86_64-linux), so this runs in parallel with bcachefs-smoke
    # and just ensures the aarch64 engine/webui/bcachefs-tools land in
    # cachix.  Without this, aarch64 boxes (Pi, Odroid, etc.) miss the
    # cache for every upgrade and rebuild Rust + npm + bcachefs-tools
    # locally — 10+ minutes of CPU per upgrade.
    runs-on: ubuntu-24.04-arm
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v17
        with:
          name: nasty
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Compute npm deps hash
        # Same trick as the x86_64 job — webui build's npmDepsHash must
        # match the current package-lock.json.
        run: |
          HASH=$(nix run nixpkgs#prefetch-npm-deps -- webui/package-lock.json 2>/dev/null)
          sed -i "s|npmDepsHash = \".*\"|npmDepsHash = \"$HASH\"|" flake.nix

      - name: Build aarch64 packages
        run: |
          nix build .#packages.aarch64-linux.engine \
            --no-link -L
          nix build .#packages.aarch64-linux.webui \
            --no-link -L
          nix build .#packages.aarch64-linux.bcachefs-tools \
            --no-link -L
