name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: Engine (fmt, clippy, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v6

      # Version must match rust-toolchain.toml at the repo root.
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --no-deps -- -D warnings

      - name: Tests
        run: cargo test --workspace --no-fail-fast

  webui:
    name: WebUI (svelte-check, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run check

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

  npm-deps-hash:
    # Verifies the npmDepsHash hardcoded in flake.nix matches the current
    # webui/package-lock.json. Without this gate, adding an npm dep silently
    # breaks every NASty appliance pulling main: CI jobs that build the
    # webui auto-recompute the hash before building (see build-iso.yml,
    # cache.yml), but end users build with the value committed in flake.nix.
    name: npmDepsHash freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Verify hash
        run: |
          EXPECTED=$(nix run nixpkgs#prefetch-npm-deps -- webui/package-lock.json 2>/dev/null)
          ACTUAL=$(grep -oE 'npmDepsHash = "[^"]*"' flake.nix | sed 's/.*"\(.*\)"/\1/')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::npmDepsHash in flake.nix is stale"
            echo "  expected: $EXPECTED"
            echo "  in tree:  $ACTUAL"
            echo
            echo "Run:"
            echo "  nix run nixpkgs#prefetch-npm-deps -- webui/package-lock.json"
            echo "and replace the npmDepsHash value in flake.nix."
            exit 1
          fi
          echo "npmDepsHash matches package-lock.json: $ACTUAL"

  installer-flake-template:
    # The installer's system-flake template must reference the same
    # bcachefs-tools input as the project's flake.nix. The ISO build copies
    # all transitive nodes from flake.lock into the system flake's lock; if
    # the template's bcachefs-tools.url drifts from flake.nix, the lock will
    # hold a different ref than the rendered flake.nix asks for and
    # nixos-install will bail out with a NAR hash mismatch on first boot.
    name: Installer template bcachefs-tools URL matches flake.nix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Compare URLs
        run: |
          PROJECT=$(grep -oE 'bcachefs-tools\.url = "[^"]+"' flake.nix | head -1)
          TEMPLATE=$(grep -oE 'bcachefs-tools\.url = "[^"]+"' nixos/system-flake/flake.nix.template | head -1)
          if [ -z "$PROJECT" ] || [ -z "$TEMPLATE" ]; then
            echo "::error::could not extract bcachefs-tools.url from one of the files"
            echo "  flake.nix:                             $PROJECT"
            echo "  nixos/system-flake/flake.nix.template: $TEMPLATE"
            exit 1
          fi
          if [ "$PROJECT" != "$TEMPLATE" ]; then
            echo "::error::installer template bcachefs-tools URL is stale"
            echo "  flake.nix:                             $PROJECT"
            echo "  nixos/system-flake/flake.nix.template: $TEMPLATE"
            echo
            echo "When bumping bcachefs-tools, update both files together."
            exit 1
          fi
          echo "Installer template matches flake.nix: $PROJECT"
