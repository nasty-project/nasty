name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: Engine (fmt, clippy, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v6

      # Version must match rust-toolchain.toml at the repo root.
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --no-deps -- -D warnings

      - name: Tests
        run: cargo test --workspace --no-fail-fast

  webui:
    name: WebUI (svelte-check, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run check

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

  npm-deps-hash:
    # Verifies the npmDepsHash hardcoded in flake.nix matches the current
    # webui/package-lock.json. Without this gate, adding an npm dep silently
    # breaks every NASty appliance pulling main: CI jobs that build the
    # webui auto-recompute the hash before building (see build-iso.yml,
    # cache.yml), but end users build with the value committed in flake.nix.
    name: npmDepsHash freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Verify hash
        run: |
          EXPECTED=$(nix run nixpkgs#prefetch-npm-deps -- webui/package-lock.json 2>/dev/null)
          ACTUAL=$(grep -oE 'npmDepsHash = "[^"]*"' flake.nix | sed 's/.*"\(.*\)"/\1/')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::npmDepsHash in flake.nix is stale"
            echo "  expected: $EXPECTED"
            echo "  in tree:  $ACTUAL"
            echo
            echo "Run:"
            echo "  nix run nixpkgs#prefetch-npm-deps -- webui/package-lock.json"
            echo "and replace the npmDepsHash value in flake.nix."
            exit 1
          fi
          echo "npmDepsHash matches package-lock.json: $ACTUAL"

  installer-flake-template:
    # Two invariants on the wrapper-flake template, each load-bearing
    # for a different reason:
    #
    # 1. `nixpkgs.follows = "nasty/nixpkgs"` (no own `nixpkgs.url`).
    #    Every Rust package in nasty's binary closure is built against
    #    the nixpkgs nasty pinned at CI time and substituted from
    #    nasty.cachix.org by content hash. If the wrapper drifted to
    #    its own nixpkgs rev, the substitution would miss and every
    #    nasty bump would recompile ~92 Rust crates locally on every
    #    operator's box. follows closes that hole — the wrapper's
    #    resolved closure is byte-identical to what CI built against.
    #
    # 2. `bcachefs-tools.url = "..."` (an actual ref, NOT a follows).
    #    Nothing in nasty's binary closure links bcachefs-tools; it's
    #    used purely as a runtime CLI + kernel module. Pinning it
    #    independently gives the operator a real escape hatch when an
    #    upstream bcachefs-tools rev regresses on their hardware —
    #    they can stay on a known-good version across nasty bumps.
    #    Following nasty here removes that capability for no cachix
    #    win, since nasty's binaries don't depend on it.
    #
    # The bcachefs-tools URL is hardcoded with a real ref (e.g.
    # "v1.38.3") rather than a `@BCACHEFS_TOOLS_REF@` placeholder.
    # The placeholder approach (#312) was a forward-compat trap:
    # pre-#312 engines (notably v0.0.8) don't know about the
    # placeholder, silently no-op when substituting it, and ship
    # the literal text into `bcachefs-tools.url` during rebootstrap
    # — breaking the next `nix flake update`. Hardcoding the ref
    # means every historical renderer (going back to v0.0.5) writes
    # a clean wrapper. Per-operator bcachefs-tools customization
    # happens via a post-render `rewrite_flake_input_urls` pass on
    # the caller side (see update.rs).
    name: Installer template canonical shape (nixpkgs follows, bcachefs.url)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Assert template uses follows for nixpkgs
        run: |
          if grep -qE '^\s*nixpkgs\.url\s*=' nixos/system-flake/flake.nix.template; then
            echo "::error::installer template owns its own nixpkgs.url — should follow nasty for cachix coverage"
            echo "Template should declare:"
            echo "  nixpkgs.follows = \"nasty/nixpkgs\";"
            echo "instead of:"
            grep -nE '^\s*nixpkgs\.url' nixos/system-flake/flake.nix.template
            exit 1
          fi
          if ! grep -qE 'nixpkgs\.follows\s*=\s*"nasty/nixpkgs"' nixos/system-flake/flake.nix.template; then
            echo "::error::installer template missing nixpkgs.follows = \"nasty/nixpkgs\""
            exit 1
          fi
          echo "Installer template correctly follows nasty/nixpkgs."

      - name: Assert template pins bcachefs-tools with its own .url (hardcoded ref, no placeholder)
        run: |
          if grep -qE 'bcachefs-tools\.follows\s*=' nixos/system-flake/flake.nix.template; then
            echo "::error::installer template declares bcachefs-tools.follows — should pin its own .url so operators can independently override"
            echo "Template should declare:"
            echo "  bcachefs-tools.url = \"github:koverstreet/bcachefs-tools/<vX.Y.Z>\";"
            echo "instead of:"
            grep -nE 'bcachefs-tools\.follows' nixos/system-flake/flake.nix.template
            exit 1
          fi
          if grep -qE 'bcachefs-tools\.url\s*=\s*"[^"]*@[A-Z_]+@' nixos/system-flake/flake.nix.template; then
            echo "::error::installer template's bcachefs-tools.url contains an @PLACEHOLDER@ — pre-#312 engines (v0.0.8) silently no-op on unknown placeholders and ship the literal text into the wrapper, breaking the next nix flake update"
            echo "Template should hardcode a real ref:"
            echo "  bcachefs-tools.url = \"github:koverstreet/bcachefs-tools/<vX.Y.Z>\";"
            echo "Current declaration:"
            grep -nE 'bcachefs-tools\.url' nixos/system-flake/flake.nix.template
            exit 1
          fi
          if ! grep -qE 'bcachefs-tools\.url\s*=\s*"github:koverstreet/bcachefs-tools/v[0-9]+\.[0-9]+\.[0-9]+"' nixos/system-flake/flake.nix.template; then
            echo "::error::installer template missing bcachefs-tools.url with a hardcoded semver tag (e.g. v1.38.3)"
            echo "Template should declare:"
            echo "  bcachefs-tools.url = \"github:koverstreet/bcachefs-tools/v1.38.3\";"
            exit 1
          fi
          echo "Installer template correctly pins bcachefs-tools.url with a hardcoded semver tag."

  installer-lock-shape:
    # The dynamic counterpart to `installer-flake-template` above.
    # The static checks there assert what the rendered template
    # textually declares; this job actually runs `nix flake lock`
    # against the rendered template and asserts the resulting lock
    # is stable across a second pass.
    #
    # Why this exists: install-time `nixos-install` builds the
    # wrapper-flake lock from the rendered template. If the lock
    # construction and the template's input declarations disagree
    # on shape, nix silently rewrites the lock mid-evaluation —
    # which invalidates the `path:/mnt/etc/nixos` narHash that
    # `nastySystemFlakeSnapshot` captures during the same eval pass
    # and surfaces as the cryptic "NAR hash mismatch in input
    # 'path:...'" errors. v0.0.9 cycle burned five PRs (#340-#344)
    # chasing successive sub-cases of this class before #344 landed
    # the "no bundled lock, regenerate at install time" fix that
    # this check protects.
    #
    # Mechanism: render the template with sed substitutions matching
    # what `render_system_flake_template_with_ref` does, point
    # `nasty.url` at this checkout (so we test THIS commit, not a
    # tagged release), then run `nix flake lock` twice. If pass 2
    # reports `Added input` or `Updated input` lines, the lock that
    # pass 1 produced doesn't match what nix's own resolver would
    # produce — i.e. the template + lock-construction code have
    # drifted out of shape with each other.
    name: Installer wrapper-lock shape stable (nix flake lock idempotent)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Render wrapper template + run two nix-flake-lock passes
        run: |
          set -euo pipefail
          TMP=$(mktemp -d)
          # Match `render_system_flake_template_with_ref`'s substitutions.
          # Rewrite `nasty.url` to a path: pointing at this checkout so we
          # test the current commit's flake shape (and avoid hammering
          # github on every CI run for what is essentially a self-test).
          sed -e 's|"github:nasty-project/nasty/@NASTY_VERSION@"|"path:'"$GITHUB_WORKSPACE"'"|' \
              -e 's|@LOCAL_SYSTEM@|x86_64-linux|g' \
              -e 's|@WRAPPER_FLAKE_VERSION@|ci-render|g' \
              nixos/system-flake/flake.nix.template > "$TMP/flake.nix"

          # The template imports these optionally; nix needs them to
          # exist when evaluating, even though we won't actually use
          # the configurations they'd contribute.
          cat > "$TMP/hardware-configuration.nix" <<'STUB'
          { ... }: { }
          STUB
          cat > "$TMP/networking.nix" <<'STUB'
          { ... }: { }
          STUB

          cd "$TMP"

          echo "::group::Pass 1: nix flake lock (build the lock from the rendered template)"
          nix flake lock 2>&1 | tee pass-1.log
          echo "::endgroup::"

          echo "::group::Pass 2: nix flake lock (must be a no-op)"
          nix flake lock 2>&1 | tee pass-2.log
          echo "::endgroup::"

          if grep -qE 'Added input|Updated input' pass-2.log; then
            echo "::error::Wrapper-lock shape is not stable — pass 2 of nix flake lock made changes."
            echo "Without this stability, install-time nixos-install would do the same lock work mid-evaluation"
            echo "and invalidate the path:/mnt/etc/nixos narHash that nastySystemFlakeSnapshot captures,"
            echo "producing the NAR hash mismatch errors that bit the v0.0.9 cycle (PRs #340-#344)."
            echo ""
            echo "Pass 2 made these changes:"
            grep -E 'Added input|Updated input' pass-2.log
            exit 1
          fi

          echo "Wrapper-lock shape is stable across two consecutive nix flake lock passes."
