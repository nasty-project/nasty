name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: Engine (fmt, clippy, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v6

      # Version must match rust-toolchain.toml at the repo root.
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --no-deps -- -D warnings

      - name: Tests
        run: cargo test --workspace --no-fail-fast

  webui:
    name: WebUI (svelte-check, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run check

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

  npm-deps-hash:
    # Verifies the npmDepsHash hardcoded in flake.nix matches the current
    # webui/package-lock.json. Without this gate, adding an npm dep silently
    # breaks every NASty appliance pulling main: CI jobs that build the
    # webui auto-recompute the hash before building (see build-iso.yml,
    # cache.yml), but end users build with the value committed in flake.nix.
    name: npmDepsHash freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Verify hash
        run: |
          EXPECTED=$(nix run nixpkgs#prefetch-npm-deps -- webui/package-lock.json 2>/dev/null)
          ACTUAL=$(grep -oE 'npmDepsHash = "[^"]*"' flake.nix | sed 's/.*"\(.*\)"/\1/')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::npmDepsHash in flake.nix is stale"
            echo "  expected: $EXPECTED"
            echo "  in tree:  $ACTUAL"
            echo
            echo "Run:"
            echo "  nix run nixpkgs#prefetch-npm-deps -- webui/package-lock.json"
            echo "and replace the npmDepsHash value in flake.nix."
            exit 1
          fi
          echo "npmDepsHash matches package-lock.json: $ACTUAL"

  installer-flake-template:
    # Two invariants on the wrapper-flake template, each load-bearing
    # for a different reason:
    #
    # 1. `nixpkgs.follows = "nasty/nixpkgs"` (no own `nixpkgs.url`).
    #    Every Rust package in nasty's binary closure is built against
    #    the nixpkgs nasty pinned at CI time and substituted from
    #    nasty.cachix.org by content hash. If the wrapper drifted to
    #    its own nixpkgs rev, the substitution would miss and every
    #    nasty bump would recompile ~92 Rust crates locally on every
    #    operator's box. follows closes that hole — the wrapper's
    #    resolved closure is byte-identical to what CI built against.
    #
    # 2. `bcachefs-tools.url = "..."` (an actual ref, NOT a follows).
    #    Nothing in nasty's binary closure links bcachefs-tools; it's
    #    used purely as a runtime CLI + kernel module. Pinning it
    #    independently gives the operator a real escape hatch when an
    #    upstream bcachefs-tools rev regresses on their hardware —
    #    they can stay on a known-good version across nasty bumps.
    #    Following nasty here removes that capability for no cachix
    #    win, since nasty's binaries don't depend on it.
    #
    # The renderer in engine/nasty-system/src/update.rs substitutes
    # @BCACHEFS_TOOLS_REF@ at template render time; the engine
    # extracts the canonical default from nasty's own flake.nix.
    name: Installer template canonical shape (nixpkgs follows, bcachefs.url)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Assert template uses follows for nixpkgs
        run: |
          if grep -qE '^\s*nixpkgs\.url\s*=' nixos/system-flake/flake.nix.template; then
            echo "::error::installer template owns its own nixpkgs.url — should follow nasty for cachix coverage"
            echo "Template should declare:"
            echo "  nixpkgs.follows = \"nasty/nixpkgs\";"
            echo "instead of:"
            grep -nE '^\s*nixpkgs\.url' nixos/system-flake/flake.nix.template
            exit 1
          fi
          if ! grep -qE 'nixpkgs\.follows\s*=\s*"nasty/nixpkgs"' nixos/system-flake/flake.nix.template; then
            echo "::error::installer template missing nixpkgs.follows = \"nasty/nixpkgs\""
            exit 1
          fi
          echo "Installer template correctly follows nasty/nixpkgs."

      - name: Assert template pins bcachefs-tools with its own .url
        run: |
          if grep -qE 'bcachefs-tools\.follows\s*=' nixos/system-flake/flake.nix.template; then
            echo "::error::installer template declares bcachefs-tools.follows — should pin its own .url so operators can independently override"
            echo "Template should declare:"
            echo "  bcachefs-tools.url = \"github:koverstreet/bcachefs-tools/@BCACHEFS_TOOLS_REF@\";"
            echo "instead of:"
            grep -nE 'bcachefs-tools\.follows' nixos/system-flake/flake.nix.template
            exit 1
          fi
          if ! grep -qE 'bcachefs-tools\.url\s*=\s*"github:koverstreet/bcachefs-tools/@BCACHEFS_TOOLS_REF@"' nixos/system-flake/flake.nix.template; then
            echo "::error::installer template missing bcachefs-tools.url with the @BCACHEFS_TOOLS_REF@ placeholder"
            echo "Template should declare:"
            echo "  bcachefs-tools.url = \"github:koverstreet/bcachefs-tools/@BCACHEFS_TOOLS_REF@\";"
            exit 1
          fi
          echo "Installer template correctly pins bcachefs-tools.url with @BCACHEFS_TOOLS_REF@ placeholder."
