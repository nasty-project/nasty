name: Weekly nixpkgs bump

# Runs `nix flake update nixpkgs` on a schedule and opens a PR with
# the result. The point is to pull in upstream kernel + package
# bumps (especially LTS kernel patches — bcachefs builds against
# whatever nixpkgs ships) without anyone having to remember to
# chase them.
#
# CI runs on the resulting PR like any other branch. The integration
# workflow builds the appliance + smoke-tests it, so a bad nixpkgs
# move fails before merge instead of in production. Cachix gets
# repopulated post-merge via integration.yml's existing push step.
#
# Heads-up about the bot PR: PRs opened with the default GITHUB_TOKEN
# do not trigger downstream workflows (GitHub's recursion guard). The
# easiest workaround is to land a personal access token as the
# `BUMP_PAT` repo secret; the steps below use it when present and
# fall back to GITHUB_TOKEN otherwise. Without it, kick CI by pushing
# an empty commit to the auto/nixpkgs-bump branch (or close + reopen
# the PR from the UI).

on:
  schedule:
    # Monday 05:00 UTC. Catches the weekend's stable kernel pushes
    # before the work week starts.
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: nixpkgs-bump
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run nix flake update nixpkgs
        id: update
        run: |
          BEFORE=$(jq -r '.nodes.nixpkgs.locked.rev' flake.lock)
          nix flake update nixpkgs
          AFTER=$(jq -r '.nodes.nixpkgs.locked.rev' flake.lock)
          echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
          echo "after=$AFTER" >> "$GITHUB_OUTPUT"
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "nixpkgs lock unchanged — exiting"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "nixpkgs moved $BEFORE → $AFTER"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect kernel bump
        # Resolve the kernel version each nixpkgs rev's `linuxPackages`
        # alias points at, and surface a delta in the PR title/body.
        #
        # `linuxPackages` is what `boot.kernelPackages` defaults to when
        # nothing in NASty overrides it (and we don't override). It's
        # an alias maintained inside nixpkgs that tracks the channel's
        # default LTS, so this auto-follows when the default rolls from
        # one LTS line to the next — no need to come back and bump a
        # hard-coded version key here.
        #
        # Was previously a hard-coded `"6.18"` lookup against
        # `kernels-org.json` (#370 reviewer noticed it'd silently break
        # once nixpkgs flips the default LTS away from 6.18).
        id: kernel
        if: steps.update.outputs.changed == 'true'
        run: |
          set -eu
          eval_kernel_version() {
            nix eval --raw --impure --expr "
              let
                pkgs = (builtins.getFlake \"github:NixOS/nixpkgs/$1\").legacyPackages.x86_64-linux;
                tried = builtins.tryEval pkgs.linuxPackages.kernel.version;
              in if tried.success then tried.value else \"unknown\"
            " 2>/dev/null || echo "unknown"
          }
          BEFORE_VER=$(eval_kernel_version "${{ steps.update.outputs.before }}")
          AFTER_VER=$(eval_kernel_version "${{ steps.update.outputs.after }}")
          echo "before=$BEFORE_VER" >> "$GITHUB_OUTPUT"
          echo "after=$AFTER_VER" >> "$GITHUB_OUTPUT"
          if [ "$BEFORE_VER" != "$AFTER_VER" ] && [ "$BEFORE_VER" != "unknown" ] && [ "$AFTER_VER" != "unknown" ]; then
            echo "summary=Linux $BEFORE_VER → $AFTER_VER" >> "$GITHUB_OUTPUT"
          else
            echo "summary=" >> "$GITHUB_OUTPUT"
          fi

      - name: Diff high-signal package versions
        # Evaluate a curated list of packages against both nixpkgs revs
        # and surface any version deltas in the PR body. One nix eval
        # per rev = two tarball fetches; runs in roughly 30–60 s on
        # GitHub-hosted runners.
        id: pkgdiff
        if: steps.update.outputs.changed == 'true'
        run: |
          set -eu
          eval_versions() {
            local rev="$1"
            nix eval --json --impure --expr "
              let
                pkgs = (builtins.getFlake \"github:NixOS/nixpkgs/$rev\").legacyPackages.x86_64-linux;
                names = [
                  \"qemu\" \"docker\" \"openssl\" \"openssh\" \"networkmanager\"
                  \"samba\" \"nfs-utils\" \"nginx\" \"targetcli-fb\" \"lvm2\"
                  \"util-linux\" \"glibc\"
                ];
                versionOf = name:
                  if builtins.hasAttr name pkgs then
                    let tried = builtins.tryEval (builtins.getAttr name pkgs).version;
                    in if tried.success then tried.value else null
                  else null;
              in builtins.listToAttrs (map (n: { name = n; value = versionOf n; }) names)
            "
          }
          BEFORE_JSON=$(eval_versions "${{ steps.update.outputs.before }}")
          AFTER_JSON=$(eval_versions "${{ steps.update.outputs.after }}")
          DIFF=$(jq -rn --argjson b "$BEFORE_JSON" --argjson a "$AFTER_JSON" '
            $b | to_entries
              | map(select(.value != null and $a[.key] != null and .value != $a[.key]))
              | .[] | "- \(.key): \(.value) → \($a[.key])"
          ')
          {
            echo 'block<<DIFFEOF'
            if [ -n "$DIFF" ]; then
              echo "**Package version changes** (curated):"
              echo
              printf '%s\n' "$DIFF"
            fi
            echo DIFFEOF
          } >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          # Prefer a PAT so downstream CI fires; fall back to the
          # default token (CI won't auto-run in that case — see the
          # header comment).
          token: ${{ secrets.BUMP_PAT || secrets.GITHUB_TOKEN }}
          branch: auto/nixpkgs-bump
          delete-branch: true
          commit-message: |
            flake: weekly nixpkgs bump

            ${{ steps.kernel.outputs.summary }}
          title: "flake: weekly nixpkgs bump${{ steps.kernel.outputs.summary && format(' — {0}', steps.kernel.outputs.summary) }}"
          body: |
            Weekly automated `nix flake update nixpkgs`.

            **nixpkgs**: `${{ steps.update.outputs.before }}` → `${{ steps.update.outputs.after }}`
            ${{ steps.kernel.outputs.summary && format('**Kernel**: {0}', steps.kernel.outputs.summary) || '' }}

            ${{ steps.pkgdiff.outputs.block }}

            Compare: https://github.com/NixOS/nixpkgs/compare/${{ steps.update.outputs.before }}...${{ steps.update.outputs.after }}

            CI runs as usual — the appliance-smoke integration test will catch most regressions before merge. Review and merge when green.
