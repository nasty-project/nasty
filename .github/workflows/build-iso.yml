name: Build NASty ISO

on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build x86_64 ISO
        run: |
          set -o pipefail
          cd nixos
          nix build .#nixosConfigurations.nasty-iso.config.system.build.isoImage \
            --no-link --print-out-paths -L 2>&1 | tee /tmp/build.log
          grep '^/nix/store' /tmp/build.log | tail -1 > /tmp/iso-path.txt
          cat /tmp/iso-path.txt

      - name: Upload ISO
        run: |
          ISO_DIR=$(cat /tmp/iso-path.txt)
          ISO_FILE=$(find "$ISO_DIR" -name "*.iso" -type f | head -1)
          echo "ISO: $ISO_FILE"
          ls -lh "$ISO_FILE"
          echo "iso_file=$ISO_FILE" >> "$GITHUB_ENV"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v6
        with:
          name: nasty-iso-x86_64
          path: ${{ env.iso_file }}
          if-no-files-found: error
