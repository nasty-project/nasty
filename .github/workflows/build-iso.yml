name: Build NASty ISO

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (tag like v0.0.1, branch, or leave empty for HEAD)'
        required: false
        default: ''

jobs:
  build-iso:
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            nix_config: nasty-iso
          - arch: aarch64
            runner: ubuntu-24.04-arm
            nix_config: nasty-iso-aarch64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-tags: true

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Compute npm deps hash
        run: |
          HASH=$(nix run nixpkgs#prefetch-npm-deps -- webui/package-lock.json 2>/dev/null)
          echo "Computed npmDepsHash: $HASH"
          sed -i "s|npmDepsHash = \".*\"|npmDepsHash = \"$HASH\"|" flake.nix
          git add flake.nix
          echo "Updated flake.nix with hash: $HASH"

      - name: Build ${{ matrix.arch }} ISO
        run: |
          set -o pipefail
          nix build .#nixosConfigurations.${{ matrix.nix_config }}.config.system.build.isoImage \
            --no-link --print-out-paths -L 2>&1 | tee /tmp/build.log
          grep -a '^/nix/store' /tmp/build.log | tail -1 > /tmp/iso-path.txt
          cat /tmp/iso-path.txt

      - name: Prepare ISO
        run: |
          ISO_DIR=$(cat /tmp/iso-path.txt)
          ISO_FILE=$(find "$ISO_DIR" -name "*.iso" -type f | head -1)
          echo "ISO: $ISO_FILE"
          ls -lh "$ISO_FILE"

          # Use the input ref if it looks like a version tag, otherwise commit-based
          INPUT_REF="${{ inputs.ref }}"
          if [[ "$INPUT_REF" == v* ]]; then
            VERSION="$INPUT_REF"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          DEST="nasty-${VERSION}-${{ matrix.arch }}.iso"
          cp "$ISO_FILE" "$DEST"
          echo "iso_dest=$DEST" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_ENV"

      - name: Upload as release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ env.version }}"
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" "${{ env.iso_dest }}" --clobber
          else
            PRERELEASE=""
            if [[ "$TAG" != v* ]]; then
              PRERELEASE="--prerelease"
            fi
            gh release create "$TAG" "${{ env.iso_dest }}" \
              --title "NASty $TAG" \
              --notes "NASty ISO build — $(git rev-parse --short HEAD)" \
              $PRERELEASE
          fi
